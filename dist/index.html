  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ide: {
              bg: 'var(--ide-bg)',
              sidebar: 'var(--ide-sidebar)',
              activity: 'var(--ide-activity)',
              panel: 'var(--ide-panel)',
              accent: 'var(--ide-accent)',
              secondary: 'var(--ide-secondary)',
              text: 'var(--ide-text)',
              muted: 'var(--ide-muted)',
              border: 'var(--ide-border)',
              'border-strong': 'var(--ide-border-strong)',
              input: 'var(--ide-input)',
              overlay: 'rgba(0,0,0,0.6)',
              hover: 'var(--ide-hover)',
              card: 'var(--ide-card)'
            }
          },
          borderRadius: {
            'capy-sm': '4px',
            'capy-md': '8px',
            'capy-lg': '12px'
          },
          animation: {
            'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
  <style>
    /* 2026 Redesign Design Tokens */
    :root {
      --ide-bg: #09090b;
      /* Zinc 950 */
      --ide-sidebar: #18181b;
      /* Zinc 900 */
      --ide-activity: #09090b;
      --ide-panel: #18181b;
      --ide-card: #27272a;
      /* Zinc 800 */
      --ide-accent: #3b82f6;
      /* Blue 500 */
      --ide-secondary: #8b5cf6;
      /* Purple 500 */
      --ide-text: #fafafa;
      /* Zinc 50 */
      --ide-muted: #71717a;
      /* Zinc 500 */
      --ide-border: rgba(255, 255, 255, 0.05);
      --ide-border-strong: rgba(255, 255, 255, 0.1);
      --ide-input: #18181b;
      --ide-hover: rgba(255, 255, 255, 0.03);
      --ide-bg-image: none;

      /* Motion Tokens */
      --motion-duration-fast: 150ms;
      --motion-duration-normal: 250ms;
      --motion-easing-out: cubic-bezier(0, 0, 0.2, 1);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--ide-border);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--ide-muted);
    }

    body {
      background-color: var(--ide-bg);
      background-image: var(--ide-bg-image);
      background-attachment: fixed;
      background-position: center top;
      background-repeat: no-repeat;
      color: var(--ide-text);
      margin: 0;
      overflow: hidden;
      /* Prevent pull-to-refresh on mobile */
      overscroll-behavior: none;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .xterm-viewport {
      background-color: transparent !important;
    }
  </style>
